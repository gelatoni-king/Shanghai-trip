<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHANGHAI TRAVEL | 滬上雲端漫步</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #FFF9F5;
            --primary-pink: #FFD3DC;
            --primary-blue: #D1F1FF;
            --primary-yellow: #FFF4BD;
            --accent-peach: #FFB5A7;
            --text-dark: #4A4A4A;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --card-shadow: 0 10px 25px rgba(255, 181, 167, 0.15);
            --radius-xl: 24px;
            --radius-lg: 18px;
        }
        [data-theme='dark'] {
            --bg-main: #1A1A1A;
            --text-dark: #F5F5F5;
            --glass-bg: rgba(40, 40, 40, 0.8);
            --card-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Quicksand', 'Noto Sans TC', sans-serif;
        }
        body {
            margin: 0;
            background-color: var(--bg-main);
            color: var(--text-dark);
            overflow-x: hidden;
            transition: background 0.3s ease;
        }
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s;
        }
        .plane-anim {
            animation: fly 2s infinite ease-in-out;
            font-size: 50px;
        }
        @keyframes fly {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
        .app-container {
            max-width: 450px;
            margin: 0 auto;
            min-height: 100vh;
            padding-bottom: 100px;
        }
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--accent-peach);
        }
        .bottom-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            height: 70px;
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        .nav-item {
            border: none;
            background: none;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.4;
            transition: 0.3s;
        }
        .nav-item.active {
            opacity: 1;
            transform: translateY(-5px);
        }
        .hero {
            padding: 40px 25px;
            text-align: center;
            background: linear-gradient(135deg, var(--primary-pink), var(--primary-blue));
            border-radius: 0 0 40px 40px;
            margin-bottom: 30px;
        }
        .hero h1 {
            margin: 0;
            font-size: 1.8rem;
        }
        .hero p {
            margin: 10px 0;
            opacity: 0.8;
            font-weight: 500;
        }
        .progress-container {
            width: 80%;
            background: rgba(255,255,255,0.3);
            height: 8px;
            border-radius: 10px;
            margin: 15px auto;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: white;
            width: 0%;
            transition: 1s;
        }
        .card {
            background: white;
            border-radius: var(--radius-xl);
            padding: 20px;
            margin: 0 20px 15px;
            box-shadow: var(--card-shadow);
            transition: 0.3s;
            border: 2px solid transparent;
        }
        [data-theme='dark'] .card {
            background: #2A2A2A;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-pink);
        }
        .timeline {
            position: relative;
            padding: 20px;
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 40px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--primary-pink);
            opacity: 0.5;
        }
        .t-item {
            position: relative;
            margin-bottom: 25px;
            padding-left: 50px;
        }
        .t-dot {
            position: absolute;
            left: 13px;
            top: 0;
            width: 15px;
            height: 15px;
            background: var(--accent-peach);
            border: 3px solid white;
            border-radius: 50%;
            z-index: 2;
        }
        .t-time {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--accent-peach);
            margin-bottom: 5px;
        }
        .t-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 15px;
            box-shadow: var(--card-shadow);
            cursor: pointer;
        }
        [data-theme='dark'] .t-card {
            background: #2A2A2A;
        }
        .t-detail {
            max-height: 0;
            overflow: hidden;
            transition: 0.4s ease-out;
            font-size: 0.9rem;
            color: #777;
        }
        .t-item.open .t-detail {
            max-height: 300px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #eee;
        }
        .btn-gmaps {
            display: inline-flex;
            align-items: center;
            padding: 8px 15px;
            background: var(--primary-blue);
            color: #4A4A4A;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 700;
            margin-top: 10px;
        }
        .food-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 0 20px;
        }
        .food-card {
            background: white;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            box-shadow: var(--card-shadow);
        }
        [data-theme='dark'] .food-card {
            background: #2A2A2A;
        }
        .food-tag {
            display: inline-block;
            font-size: 0.7rem;
            background: var(--primary-yellow);
            color: #4A4A4A;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 8px;
        }
        .floating-btn {
            position: fixed;
            right: 25px;
            bottom: 100px;
            width: 50px;
            height: 50px;
            background: var(--accent-peach);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
        }
        .view {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .view.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div id="loader">
    <div class="plane-anim">✈️</div>
    <p style="font-weight: 700; color: #FFB5A7;">正在飛往滬上...</p>
</div>
<div class="app-container">
    <nav class="top-nav">
        <div class="logo">SHANGHAI 2026 🍡</div>
        <button onclick="toggleDarkMode()" style="background:none; border:none; font-size:1.4rem;">🌓</button>
    </nav>
    <main id="main-view">
        <section id="view-home" class="view active">
            <div class="hero">
                <p>Hello, my lovely Oppa! 🐾</p>
                <h1>白桃主場行程表</h1>
                <p>5月21日 - 5月27日</p>
                <div class="progress-container">
                    <div class="progress-bar" id="main-progress"></div>
                </div>
                <small>目前解鎖進度：<span id="progress-text">0</span>%</small>
            </div>
            <div id="day-selector"></div>
        </section>
        <section id="view-day" class="view">
            <div id="day-header"></div>
            <div class="timeline" id="day-timeline"></div>
        </section>
        <section id="view-food" class="view">
            <div class="hero" style="background: var(--primary-yellow);">
                <h1>男友胃保衛戰 🍽️</h1>
                <p>✅ 不吃辣 ✅ 不吃海鮮 ✅ 不吃羊肉</p>
            </div>
            <div class="food-grid" id="food-list"></div>
        </section>
        <section id="view-map" class="view">
            <div class="hero" style="background: var(--primary-blue);">
                <h1>地標快捷導航 📍</h1>
                <p>一鍵抵達目的地</p>
            </div>
            <div id="map-list"></div>
        </section>
    </main>
    <button class="floating-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">⬆️</button>
    <nav class="bottom-bar">
        <button class="nav-item active" onclick="switchView('view-home', this)">🏠</button>
        <button class="nav-item" onclick="switchView('view-food', this)">🍜</button>
        <button class="nav-item" onclick="switchView('view-map', this)">📍</button>
    </nav>
</div>
<script>
    const travelData = [
        {
            day: 1,
            date: "5月21日",
            theme: "抵達上海，入住草莓酒店",
            mood: "☁️",
            color: "#FFD3DC",
            events: [
                { time: "17:50", type: "✈️", title: "抵達浦東機場", desc: "抵達上海浦東國際機場，建議直接打車或網約車前往酒店。", gmaps: "https://maps.google.com/?q=Shanghai+Pudong+International+Airport" },
                { time: "19:30", type: "🏨", title: "入住 Conrad Shanghai", desc: "酒店位於南京東路起點，適合晚上散步與覓食。", gmaps: "https://maps.google.com/?q=Conrad+Shanghai" },
                { time: "20:00", type: "🍽️", title: "晚餐：沈大成", desc: "必點：鮮肉小籠、炸豬排。不辣且經典。", gmaps: "https://maps.google.com/?q=Shen+Da+Cheng+Nanjing+East+Road" }
            ]
        },
        {
            day: 2,
            date: "5月22日",
            theme: "老洋房與潮流",
            mood: "📷",
            color: "#D1F1FF",
            events: [
                { time: "09:00", type: "🍽️", title: "早餐：萊萊小籠", desc: "清晨的天津路。炸豬排配辣醬油是靈魂。", gmaps: "https://maps.google.com/?q=Lai+Lai+Xiao+Long" },
                { time: "11:00", type: "🏛️", title: "Citywalk：武康路", desc: "與武康大樓拍照，拿出國際飯店大蝴蝶酥配咖啡。", gmaps: "https://maps.google.com/?q=Wukang+Mansion" },
                { time: "13:00", type: "🍽️", title: "午餐：人和館（徐匯店）", desc: "米其林一星。紅燒肉不辣且入味。", gmaps: "https://maps.google.com/?q=Ren+He+Guan+Shanghai" }
            ]
        },
        {
            day: 3,
            date: "5月23日",
            theme: "Pokémon 與日落",
            mood: "⚡",
            color: "#FFF4BD",
            events: [
                { time: "12:00", type: "🏛️", title: "Pokémon 道館：五角場", desc: "上海最大的 Pokémon 道館之一。", gmaps: "https://maps.google.com/?q=Cloud+Nine+Shopping+Mall+Pokemon+Center" },
                { time: "18:15", type: "🛳️", title: "東復線渡輪賞日落", desc: "2元錢看全上海最美日落亮燈。", gmaps: "https://maps.google.com/?q=Dongchang+Road+Ferry+Terminal" },
                { time: "19:30", type: "🍽️", title: "晚餐：晟永興（陸家嘴）", desc: "必點：棗木烤鴨、黑椒牛肉粒。", gmaps: "https://maps.google.com/?q=Sheng+Yong+Xing+Lujiazui" }
            ]
        },
        {
            day: 4,
            date: "5月24日",
            theme: "江南園林與宮宴",
            mood: "🌸",
            color: "#FFE16F",
            events: [
                { time: "14:30", type: "🏛️", title: "豫園 & 九曲橋", desc: "古典江南園林，下午茶可吃大壺春生煎。", gmaps: "https://maps.google.com/?q=Yu+Garden+Shanghai" },
                { time: "18:30", type: "🍽️", title: "晚餐：宮宴（漢服體驗）", desc: "換漢服入座。已備註去海鮮與羊肉。", gmaps: "https://maps.google.com/?q=Gong+Yan+Oriental+Art+Palace+Shanghai" }
            ]
        },
        {
            day: 5,
            date: "5月25-26日",
            theme: "迪士尼奇妙日",
            mood: "🎡",
            color: "#FFB5A7",
            events: [
                { time: "08:00", type: "🎢", title: "迪士尼早享入園", desc: "入住樂園酒店可提早入園，建議先衝熱門項目。", gmaps: "https://maps.google.com/?q=Shanghai+Disneyland" },
                { time: "18:00", type: "🍽️", title: "晚餐：芝樂坊（Disney Town）", desc: "高熱量炸雞意粉與起司蛋糕，無海鮮安全牌。", gmaps: "https://maps.google.com/?q=The+Cheesecake+Factory+Disney+Town" }
            ]
        }
    ];
    const foodRecs = [
        { name: "人和館紅燒肉", reason: "軟糯香甜，完全不辣", icon: "🥩" },
        { name: "晟永興烤鴨", reason: "師傅現場片皮，只沾白糖吃", icon: "🦆" },
        { name: "小紹興白斬雞", reason: "鮮嫩清淡，男友最愛", icon: "🐔" },
        { name: "沈大成炸豬排", reason: "配泰康黃牌辣醬油，解膩王", icon: "🐷" }
    ];
    const spots = [
        "Conrad Shanghai",
        "Shanghai Pudong International Airport",
        "Shen Da Cheng Nanjing East Road",
        "Lai Lai Xiao Long",
        "Wukang Mansion",
        "Ren He Guan Shanghai",
        "Cloud Nine Shopping Mall Pokemon Center",
        "Dongchang Road Ferry Terminal",
        "Sheng Yong Xing Lujiazui",
        "Yu Garden Shanghai",
        "Gong Yan Oriental Art Palace Shanghai",
        "Shanghai Disneyland",
        "The Cheesecake Factory Disney Town"
    ];
    function init() {
        renderHome();
        renderFood();
        renderMap();
        setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
            }, 600);
            updateProgress(30);
        }, 1500);
    }
    function renderHome() {
        const container = document.getElementById('day-selector');
        container.innerHTML = "";
        travelData.forEach(day => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;" onclick="showDay(${day.day})">
                    <div>
                        <span style="font-size:0.8rem; font-weight:700; color:var(--accent-peach)">DAY ${day.day}</span>
                        <h2 style="margin:5px 0; font-size:1.1rem;">${day.theme}</h2>
                        <small>${day.date}</small>
                    </div>
                    <div style="font-size:2rem;">${day.mood}</div>
                </div>
            `;
            container.appendChild(card);
        });
    }
    function showDay(dayNum) {
        const day = travelData.find(d => d.day === dayNum);
        const header = document.getElementById('day-header');
        const timeline = document.getElementById('day-timeline');
        header.innerHTML = `
            <div class="hero" style="background:${day.color}">
                <button onclick="switchView('view-home')" style="border:none; background:none; font-size:1.5rem; float:left;">🔙</button>
                <h1>Day ${day.day}</h1>
                <p>${day.date} · ${day.theme}</p>
            </div>
        `;
        timeline.innerHTML = day.events.map(e => `
            <div class="t-item" onclick="this.classList.toggle('open')">
                <div class="t-dot"></div>
                <div class="t-time">${e.time}</div>
                <div class="t-card">
                    <div style="font-weight:700;">${e.type} ${e.title}</div>
                    <div class="t-detail">
                        ${e.desc}
                        <br>
                        <a href="${e.gmaps}" target="_blank" class="btn-gmaps">📍 打開 Google Maps</a>
                    </div>
                </div>
            </div>
        `).join('');
        switchView('view-day');
    }
    function renderFood() {
        const list = document.getElementById('food-list');
        list.innerHTML = "";
        foodRecs.forEach(f => {
            list.innerHTML += `
                <div class="food-card">
                    <div style="font-size:2rem; margin-bottom:10px;">${f.icon}</div>
                    <div style="font-weight:700; font-size:0.9rem;">${f.name}</div>
                    <div class="food-tag">${f.reason}</div>
                </div>
            `;
        });
    }
    function renderMap() {
        const list = document.getElementById('map-list');
        list.innerHTML = "";
        spots.forEach(s => {
            const query = encodeURIComponent(s);
            list.innerHTML += `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>${s}</span>
                    <a href="https://maps.google.com/?q=${query}" target="_blank" class="btn-gmaps" style="margin-top:0">導航</a>
                </div>
            `;
        });
    }
    function switchView(viewId, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        if (btn) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            btn.classList.add('active');
        }
        window.scrollTo(0, 0);
    }
    function toggleDarkMode() {
        const body = document.body;
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
        } else {
            body.setAttribute('data-theme', 'dark');
        }
    }
    function updateProgress(val) {
        document.getElementById('main-progress').style.width = val + '%';
        document.getElementById('progress-text').innerText = val;
    }
    init();
</script>
</body>
</html>
